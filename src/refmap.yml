# for standardizing column names

BAR_FORMAT: "{desc:<21}{percentage:3.0f}%|{bar:15}{r_bar}"

NSE: # For extractions from nseindia.com

  INDICES: ['NIFTY','FINNIFTY','BANKNIFTY', 'INDIAVIX', 'MIDCPNIFTY']

  EQUITY:   # Underlying equity column renames
    symbol: nse_symbol
    lastPrice: lastPrice
    open: Open
    dayHigh: High
    dayLow: Low

  EQUITY_HIST:  # Equity History column renames
    CH_SYMBOL: nse_symbol
    CH_TIMESTAMP: Date
    CH_LAST_TRADED_PRICE: lastPrice
    CH_OPENING_PRICE: Open
    CH_TRADE_HIGH_PRICE: High
    CH_TRADE_LOW_PRICE: Low
    CH_CLOSING_PRICE: Close
    CH_TOT_TRADED_QTY: totalTradeQty
    CH_TOT_TRADED_VAL: totalTradeVal
    VWAP: VWAP

  INDEX:    # Underlying index column renames
    symbol: nse_symbol
    last: lastPrice
    open: Open
    high: High
    low: Low    

  INDEX_HIST: # History of Index column renames
    HistoricalDate: Date
    INDEX_NAME: symbol
    OPEN: Open
    HIGH: High
    LOW: Low
    CLOSE: Close

  INDEX_SYM_MAP: # Index symbol map for history
    NIFTY 50: 'NIFTY'
    NIFTY BANK: 'BANKNIFTY'
    INDIA VIX: 'INDIAVIX'
    NIFTY FIN SERVICE: 'FINNIFTY'
    NIFTY MIDCAP 50: 'MIDCPNIFTY'

  OPT_HIST: # Option history column renames
    FH_SYMBOL: nse_symbol
    FH_OPTION_TYPE: Right
    FH_TIMESTAMP: Date
    FH_EXPIRY_DT: Expiry
    FH_STRIKE_PRICE: Strike
    FH_LAST_TRADED_PRICE: lastPrice
    FH_OPENING_PRICE: Open
    FH_TRADE_HIGH_PRICE: High
    FH_TRADE_LOW_PRICE: Low
    FH_CLOSING_PRICE: Close
    FH_OPEN_INT: oi
    FH_MARKET_LOT: lot
    FH_SETTLE_PRICE: settledPrice
    FH_UNDERLYING_VALUE: undPrice
    FH_TOT_TRADED_QTY: totalTradeQty
    FH_TOT_TRADED_VAL: totalTradeVal
    CALCULATED_PREMIUM_VAL: calcPremium


  INDEX_HIST_HEADER: # Request header only for Index history
    Connection: 'keep-alive'
    sec-ch-ua: '" Not;A Brand";v="99", "Google Chrome";v="91", "Chromium";v="91"'
    Accept: 'application/json, text/javascript, */*; q=0.01'
    DNT: '1'
    X-Requested-With: 'XMLHttpRequest'
    sec-ch-ua-mobile: '?0'
    User-Agent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.77 Safari/537.36'
    Content-Type: 'application/json; charset=UTF-8'
    Origin: 'https://niftyindices.com'
    Sec-Fetch-Site: 'same-origin'
    Sec-Fetch-Mode: 'cors'
    Sec-Fetch-Dest: 'empty'
    Referer: 'https://niftyindices.com/reports/historical-data'
    Accept-Language: 'en-US,en;q=0.9,hi;q=0.8'

  HEADER: # Request header for all others (non-Index history)
    User-Agent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:74.0) Gecko/20100101 Firefox/74.0'


  # Option Expiry dates for date.weekday()
  # or trading holiday, fno expires the day before
  EXPIRY_DAY_OLD: &old_expiry  # before 14-July-2023
    OLD_DATE: '20230714' # Date when the change was made in %Y%m%d format
    FINNIFTY: 1     # Tuesdays
    INDIAVIX: 1     # Tuesdays. No option trading yet
    MIDCPNIFTY: 2   # Wednesdays
    EQUITIES: 3     # Thursdays
    NIFTY: 4        # Fridays
    BANKNIFTY: 4    # Fridays

  EXPIRY_DAY:
    <<: *old_expiry # copy the previous old_expiry expiry configuration
    EQUITIES: 4     # Fridays. Over-writes the old

  # Abnormal expiry dates in changed from: to format
  # %Y%m%d format
  ABNORMAL:
    '20230629': '20230628' # Bakri-Id adjustment

